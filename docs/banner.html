<!DOCTYPE html>

<head>
  <title>Mine | Banner Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
  class="bg-gray-200 min-h-screen flex flex-col items-center justify-center py-12 gap-16 font-sans selection:bg-gray-400">
  <!-- Dark Mode (GitHub Dark: #0d1117)      -->
  <div class="flex flex-col gap-3">
    <span class="text-sm font-semibold text-gray-500 uppercase tracking-widest px-2">Dark Mode Variant</span>
    <div class="shadow-xl">
      <div class="w-[1000px] h-[400px] bg-[#0d1117] flex flex-col items-center justify-center relative overflow-hidden">
        <h1 class="text-8xl font-bold text-white mb-6 tracking-normal">
          <span class="bg-white text-[#0d1117] inline-block">M</span>ine.
        </h1>
        <p class="text-3xl text-gray-400 font-light">
          An open-source text editor.
        </p>
      </div>
    </div>
  </div>
  <!-- Light Mode (GitHub Light: #ffffff)    -->
  <div class="flex flex-col gap-3">
    <span class="text-sm font-semibold text-gray-500 uppercase tracking-widest px-2">Light Mode Variant</span>
    <div class="shadow-xl">
      <div class="w-[1000px] h-[400px] bg-white flex flex-col items-center justify-center relative overflow-hidden">
        <h1 class="text-8xl font-bold text-[#0d1117] mb-6 tracking-normal">
          <span class="bg-[#0d1117] text-white inline-block">M</span>ine.
        </h1>
        <p class="text-3xl text-gray-500 font-light">
          An open-source text editor.
        </p>
      </div>
    </div>
  </div>
</body>

</html>
