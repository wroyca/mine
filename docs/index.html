<!DOCTYPE html>

<head>
  <title>Mine | Text Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes reverse-video
    {
      0%, 49.9%
      {
        background-color: white;
        color: #0d1117;
      }

      50%, 100%
      {
        background-color: transparent;
        color: white;
      }
    }

    .cursor-blink
    {
      animation: reverse-video 1.2s infinite;
    }
  </style>
</head>

      <a href="https://github.com/wroyca/mine/releases" class="w-full sm:w-auto inline-flex justify-center items-center px-6 py-3 border border-white rounded text-base font-medium transition-all duration-200 bg-white text-[#0d1117] hover:bg-transparent hover:text-white">
